name: fapp
description: "Financial literacy app for teenagers (13-18)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.3

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP & storage
  http: ^1.2.2
  shared_preferences: ^2.3.4

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
