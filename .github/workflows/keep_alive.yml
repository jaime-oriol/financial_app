name: Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"   # cada 10 minutos
  workflow_dispatch:          # tambien ejecutable a mano desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: curl -sf --retry 3 --retry-delay 10 https://fapp-api.onrender.com/health || true

      - name: Ping frontend
        run: curl -sf --retry 2 --retry-delay 8 https://financial-app-xai5.onrender.com || true
