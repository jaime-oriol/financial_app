name: Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"   # cada 10 minutos
  workflow_dispatch:          # tambien ejecutable a mano desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: curl -sf https://fapp-api.onrender.com/health

      - name: Ping frontend
        run: curl -sf https://financial-app-xai5.onrender.com || true
